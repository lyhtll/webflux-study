spring:
  # H2 (R2DBC)
  r2dbc:
    url: r2dbc:h2:mem:///fluxchat
    username: sa
    password:
  flyway:
    enabled: true
    url: jdbc:h2:mem:fluxchat;DB_CLOSE_DELAY=-1
    user: sa
    password:
  sql:
    init:
      mode: never  # schema.sql 비활성화
  # MongoDB
  mongodb:
    uri: mongodb://localhost:27017/fluxchat

    # Redis
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret_key: flux-chat-secret-key-must-be-at-least-256-bits-long-enough
  access-expiration-minutes: 15
  refresh-expiration-days: 14